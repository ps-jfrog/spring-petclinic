    name: "Docker: SYNC Sleep few seconds"
    needs: dockerSaasDistribute
    runs-on: ubuntu-latest
    env:
      SLEEP_TIME: 60
    steps:
      - name: "Sleep for ${{env.SLEEP_TIME}} seconds"
        run: |
          echo "Sleeping for ${{env.SLEEP_TIME}} seconds..."
