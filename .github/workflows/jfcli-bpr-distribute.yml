name: "BPR: RBv1 Distribute"
on: 
  workflow_run:
    workflows: 
      # - "BPR: Package"
      - "BPR: Promote"
    types: [completed]
permissions:
  pull-requests: write
  contents: write
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  security-events: write # Required for uploading code scanning.
  attestations: write
  artifact-metadata: write
env:
  JF_RT_URL: "https://${{vars.JF_NAME}}.jfrog.io"
  BUILD_NAME: "spring-petclinic" # spring-petclinic-3.5.0-SNAPSHOT.jar
  RBv1_BUNDLE_NAME: "rbv1-spring-petclinic"
  PROJECT_KEY: "ps-build-promote"
  JOB_SUMMARY: false
  CLI_LOG_LEVEL: DEBUG # DEBUG, INFO, WARN, ERROR
  JAVA_DISTRIBUTION: 'temurin'
  RBV1_GPG_PASSPHRASE: "${{secrets.RBV1_GPG_PASSPHRASE}}"
  RBv1_SPEC_JSON: "rbv1-spec-info.json" 
  JAVA_VERSION: '25'
  #RBV2_SIGNING_KEY: "${{secrets.RBV2_SIGNING_KEY}}" # ref https://jfrog.com/help/r/jfrog-artifactory-documentation/create-signing-keys-for-release-bundles-v2
  DEFAULT_WORKSPACE: "${{github.workspace}}"  # /home/runner/work/spring-petclinic/spring-petclinic

jobs:
  resolvePackageRun:
    name: "Resolve BPR: Package run number"
    # Jobs do not start when BPR: Promote failed or was cancelled.
    # Promote uses a failing gate on Package failure so its conclusion is not a false success.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      package_run_number: ${{ steps.pkg.outputs.package_run_number }}
    steps:
      - name: "Resolve BPR Package run number"
        id: pkg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event.workflow_run.name }}" == "BPR: Package" ]]; then
            N="${{ github.event.workflow_run.run_number }}"
          else
            SHA='${{ github.event.workflow_run.head_sha }}'
            N=$(gh api "repos/${{ github.repository }}/actions/workflows/jfcli-bpr.yml/runs?head_sha=${SHA}&per_page=20" \
              --jq '(.workflow_runs | map(select(.name=="BPR: Package")) | sort_by(.created_at) | reverse | .[0].run_number // empty)')
            [[ -n "$N" ]] || { echo "::error::Could not resolve BPR: Package run_number for sha=${SHA}"; exit 1; }
          fi
          echo "package_run_number=${N}" >> "$GITHUB_OUTPUT"
          echo "Resolved BPR: Package run_number=${N} (trigger=${{ github.event.workflow_run.name }})"

  dockerRBv1Distribution:
    name: "Docker: RBv1 Distribution"
    needs: resolvePackageRun
    runs-on: ubuntu-latest
    env:
      BUILD_ID: "dkr-${{ needs.resolvePackageRun.outputs.package_run_number }}"
      RBV2_BUNDLE_ID: "dkr-${{ needs.resolvePackageRun.outputs.package_run_number }}"
      RBv2_SPEC_JSON: "rbv2-spec-info.json"
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v5
        id: setup-cli
        env:
          JF_URL: ${{env.JF_RT_URL}}
          JF_PROJECT: "${{env.PROJECT_KEY}}"
          JFROG_CLI_LOG_LEVEL: "${{env.CLI_LOG_LEVEL}}"
        with:
          version: latest  #2.71.0
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
          disable-job-summary: ${{env.JOB_SUMMARY}}

      - name: "RLM: RBv2 spec - create"
        run: |
          echo "{ \"files\": [ {\"build\": \"${{env.BUILD_NAME}}/${{env.BUILD_ID}}\", \"includeDeps\":\"true\", \"project\":\"${{env.PROJECT_KEY}}\"} ] }"  > ${{env.RBv2_SPEC_JSON}}
          cat ${{env.RBv2_SPEC_JSON}}

      - name: "RLM: RBv2 Create NEW"
        run: |
          jf rbc ${{env.RBV2_BUNDLE_NAME}} ${{env.BUILD_ID}} --sync=true --signing-key=${{secrets.RBV2_SIGNING_KEY}} --spec=${{env.RBv2_SPEC_JSON}} --project=${{env.PROJECT_KEY}}

      - name: "RLM: Xray Indexing"
        run: |
            jf xr curl "/api/v1/binMgr/release_bundle_v2" -H 'Content-Type: application/json' -d "{\"names\": [\"${{env.RBV2_BUNDLE_NAME}}\"] }"

      # ref: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#distribute-a-release-bundle-v2
      - name: "RBv2 Distribute to SaaS Artifactory and edges"
        continue-on-error: true
        run: |
          jf rbd ${{env.RBV2_BUNDLE_NAME}} ${{env.BUILD_ID}} --sync=true --create-repo=true --site=${{vars.JF_EDGE_NAME}} --project=${{env.PROJECT_KEY}}

      - name: "Query Distribution status"  # https://psazuse.jfrog.io/lifecycle/api/v2/distribution/trackers/spring-petclinic/ga-49
        run: |
            jf rt curl "/lifecycle/api/v2/distribution/trackers/${{env.BUILD_NAME}}/${{env.BUILD_ID}}"

      - name: "Optional Saas Artifactory summary"
        continue-on-error: true
        env:
          CURL_URL: "${{env.JF_RT_URL}}/lifecycle/api/v2/distribution/trackers/${{env.BUILD_NAME}}/${{env.BUILD_ID}}"
        run: |
          echo "# :frog: Docker DL 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Artifactory [${{env.JF_RT_URL}}](${{env.JF_RT_URL}}) to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle name: ${{env.RBV2_BUNDLE_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle ID: ${{env.RBV2_BUNDLE_ID}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build name: ${{env.BUILD_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build ID: ${{env.BUILD_ID}} to " >> $GITHUB_STEP_SUMMARY
          RB2_DISTRIBUTE_RESP=$(curl -v -G ${{env.CURL_URL}} -H 'Content-Type:  application/json' -H "Authorization: Bearer ${{steps.setup-cli.outputs.oidc-token}}")
          echo $RB2_DISTRIBUTE_RESP > RB2_DISTRIBUTE-${{env.BUILD_ID}}.json
          cat RB2_DISTRIBUTE-${{env.BUILD_ID}}.json 
          items=$(echo "$RB2_DISTRIBUTE_RESP" | jq -c -r '.[] .targets[]')
          for item in ${items[@]}; do
            echo $item
            echo "   - [${item}.jfrog.io](https://${item}.jfrog.io) " >> $GITHUB_STEP_SUMMARY
          done
          echo " " >> $GITHUB_STEP_SUMMARY

  dockerDownloadRBv1FromSaasEdge:
    name: "Docker: Download RBv1 from SaaS ${{vars.JF_EDGE_NAME}} Edge"
    needs: dockerRBv1Distribution
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    env:
      JF_EDGE_URL: "https://${{vars.JF_EDGE_NAME}}.jfrog.io"
      BUILD_ID: "psj-dkr-${{github.run_number}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        id: setup-cli
        env:
          JF_URL: ${{env.JF_EDGE_URL}}
          JFROG_CLI_LOG_LEVEL: "ERROR"
        with:
          version: latest 
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}    
          disable-job-summary: ${{env.JOB_SUMMARY}}
      
      - name: "Edge config show"
        run: |
          jf config show

      - name: "Download Build from SaaS Edge"
        run: |
          jf rt dl --build-name=${{env.BUILD_NAME}} --build-number=${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      # refer: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#download-release-bundle-v2-content
      - name: "Download RBv2 from SaaS Edge"
        run: |
          jf rt dl --bundle ${{env.RBV2_BUNDLE_NAME}}/${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      # refer: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#download-release-bundle-v2-content
      - name: "Download RBv2 from SaaS Edge"
        run: |
          jf rt dl --bundle ${{env.RBV2_BUNDLE_NAME}}/${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      - name: "Info list"
        run: |
          pwd
          ls -lR .

      - name: "Optional: Saas ${{vars.JF_EDGE_NAME}} Edge summary"
        run: |
          echo "# :frog: Download package from SaaS ${{vars.JF_EDGE_URL}} 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Edge [${{vars.JF_EDGE_NAME}}](${{env.JF_EDGE_URL}}) " >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY

  mvnRBv1Distribution:
    name: "MVN: RBv1 Distribution"
    needs: resolvePackageRun
    runs-on: ubuntu-latest
    env:
      BUILD_ID: "mvn-${{ needs.resolvePackageRun.outputs.package_run_number }}"
      RT_REPO_LOCAL_PROD: "bpr-spring-petclinic-mvn-prod-local"
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v5
        id: setup-cli
        env:
          JF_URL: ${{env.JF_RT_URL}}
          JF_PROJECT: "${{env.PROJECT_KEY}}"
          JFROG_CLI_LOG_LEVEL: "${{env.CLI_LOG_LEVEL}}"
        with:
          version: latest  #2.71.0
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
          disable-job-summary: ${{env.JOB_SUMMARY}}

      - name: "RLM: RBv1 spec - create"
        run: |
          cat > "${{env.RBv1_SPEC_JSON}}" <<EOF
          {
            "files": [
              {
                "pattern": "${{env.RT_REPO_LOCAL_PROD}}/org/springframework/samples/spring-petclinic/*",
                "props": "build.name=${{env.BUILD_NAME}};build.number=${{env.BUILD_ID}}"
              }
            ]
          }
          EOF
          cat ${{env.RBv2_SPEC_JSON}}

        # ref: https://docs.jfrog.com/artifactory/docs/distribution-through-cli#creating-a-release-bundle
      - name: "Sign RBv1 bundle"
        run: |
          jf ds rbc "${{env.RBv1_BUNDLE_NAME}}" "${{env.BUILD_ID}}" --spec="${{env.RBv1_SPEC_JSON}}" --sign --passphrase="${{env.RBV1_GPG_PASSPHRASE}}" --detailed-summary

        # ref: https://docs.jfrog.com/artifactory/docs/distribution-through-cli#distributing-a-release-bundle
      - name: "Distribute RBv1 to Edge"
        run: |
          jf ds rbd "${{env.RBv1_BUNDLE_NAME}}" "${{env.BUILD_ID}}" --sync --create-repo --max-wait-minutes=30 --site="${{vars.JF_EDGE_NAME}}"

      - name: "Optional Saas Artifactory summary"
        continue-on-error: true
        env:
          CURL_URL: "${{env.JF_RT_URL}}/lifecycle/api/v2/distribution/trackers/${{env.BUILD_NAME}}/${{env.BUILD_ID}}"
          RB1_DISTRIBUTE_RESP_JSON: "RB1_DISTRIBUTE-${{env.BUILD_ID}}.json"
        run: |
          echo "# :frog: MVN DL 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Artifactory [${{env.JF_RT_URL}}](${{env.JF_RT_URL}}) to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle (RBv1) name: ${{env.RBV1_BUNDLE_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle (RBv1) ID: ${{env.BUILD_ID}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build name: ${{env.BUILD_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build ID: ${{env.BUILD_ID}} to " >> $GITHUB_STEP_SUMMARY
          
          curl --request GET --url "https://${{env.JF_RT_URL}}/distribution/api/v1/release_bundle/${{env.RBV1_BUNDLE_NAME}}/${{env.BUILD_ID}}/distribution" --header 'Content-Type: application/json' --header "Authorization: Bearer ${{steps.setup-cli.outputs.oidc-token}}" > "{{env.RB1_DISTRIBUTE_RESP_JSON}}"
          cat "${{env.RB1_DISTRIBUTE_RESP_JSON}}"
          echo "  - Artifacts distributed to the below sites " >> $GITHUB_STEP_SUMMARY
          items=$(jq -c -r '.[].sites[].target_artifactory.name' "${{env.RB1_DISTRIBUTE_RESP_JSON}}")
          for item in ${items}; do
            echo "${item}"
            if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
              echo "   - [${item}.jfrog.io](https://${item}.jfrog.io)/ui/release-bundles/target/${{env.RBV1_BUNDLE_NAME}}" >> "${GITHUB_STEP_SUMMARY}"
            fi
          done

          echo " " >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY

  mvnDownloadRBv1FromSaasEdge:
    name: "MVN: Download RBv1 from SaaS ${{vars.JF_EDGE_NAME}} Edge"
    needs: mvnRBv1Distribution
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    env:
      JF_EDGE_URL: "https://${{vars.JF_EDGE_NAME}}.jfrog.io"
      BUILD_ID: "psj-dkr-${{github.run_number}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        id: setup-cli
        env:
          JF_URL: ${{env.JF_EDGE_URL}}
          JFROG_CLI_LOG_LEVEL: "ERROR"
        with:
          version: latest 
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}    
          disable-job-summary: ${{env.JOB_SUMMARY}}
      
      - name: "Edge config show"
        run: |
          jf config show

      - name: "Download Build from SaaS Edge"
        run: |
          jf rt dl --build-name=${{env.BUILD_NAME}} --build-number=${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      # refer: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#download-release-bundle-v2-content
      - name: "Download RBv2 from SaaS Edge"
        run: |
          jf rt dl --bundle ${{env.RBV2_BUNDLE_NAME}}/${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      - name: "Info list"
        run: |
          pwd
          ls -lR .

      - name: "Optional: Saas ${{vars.JF_EDGE_NAME}} Edge summary"
        run: |
          echo "# :frog: Download package from SaaS ${{vars.JF_EDGE_URL}} 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Edge [${{vars.JF_EDGE_NAME}}](${{env.JF_EDGE_URL}}) " >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY

  gradleRBv1Distribution:
    name: "Gradle: RBv1 Distribution"
    needs: resolvePackageRun
    runs-on: ubuntu-latest
    env:
      BUILD_ID: "gdl-${{ needs.resolvePackageRun.outputs.package_run_number }}"
      RBV2_BUNDLE_ID: "gdl-${{ needs.resolvePackageRun.outputs.package_run_number }}"
      RBv2_SPEC_JSON: "rbv2-spec-info.json"
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v5
        id: setup-cli
        env:
          JF_URL: ${{env.JF_RT_URL}}
          JF_PROJECT: "${{env.PROJECT_KEY}}"
          JFROG_CLI_LOG_LEVEL: "${{env.CLI_LOG_LEVEL}}"
        with:
          version: latest  #2.71.0
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}
          disable-job-summary: ${{env.JOB_SUMMARY}}

      - name: "RLM: RBv2 spec - create"
        run: |
          echo "{ \"files\": [ {\"build\": \"${{env.BUILD_NAME}}/${{env.BUILD_ID}}\", \"includeDeps\":\"true\", \"project\":\"${{env.PROJECT_KEY}}\"} ] }"  > ${{env.RBv2_SPEC_JSON}}
          cat ${{env.RBv2_SPEC_JSON}}

      - name: "RLM: RBv2 Create NEW"
        run: |
          jf rbc ${{env.RBV2_BUNDLE_NAME}} ${{env.BUILD_ID}} --sync=true --signing-key=${{secrets.RBV2_SIGNING_KEY}} --spec=${{env.RBv2_SPEC_JSON}} --project=${{env.PROJECT_KEY}}

      - name: "RLM: Xray Indexing"
        run: |
            jf xr curl "/api/v1/binMgr/release_bundle_v2" -H 'Content-Type: application/json' -d "{\"names\": [\"${{env.RBV2_BUNDLE_NAME}}\"] }"

      # ref: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#distribute-a-release-bundle-v2
      - name: "RBv2 Distribute to SaaS Artifactory and edges"
        continue-on-error: true
        run: |
          jf rbd ${{env.RBV2_BUNDLE_NAME}} ${{env.BUILD_ID}} --sync=true --create-repo=true --site=${{vars.JF_EDGE_NAME}} --project=${{env.PROJECT_KEY}}

      - name: "Query Distribution status"  # https://psazuse.jfrog.io/lifecycle/api/v2/distribution/trackers/spring-petclinic/ga-49
        run: |
            jf rt curl "/lifecycle/api/v2/distribution/trackers/${{env.BUILD_NAME}}/${{env.BUILD_ID}}"

      - name: "Optional Saas Artifactory summary"
        continue-on-error: true
        env:
          CURL_URL: "${{env.JF_RT_URL}}/lifecycle/api/v2/distribution/trackers/${{env.BUILD_NAME}}/${{env.BUILD_ID}}"
        run: |
          echo "# :frog: Gradle DL 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Artifactory [${{env.JF_RT_URL}}](${{env.JF_RT_URL}}) to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle name: ${{env.RBV2_BUNDLE_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Rlease Bundle ID: ${{env.RBV2_BUNDLE_ID}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build name: ${{env.BUILD_NAME}} to " >> $GITHUB_STEP_SUMMARY
          echo "  - Build ID: ${{env.BUILD_ID}} to " >> $GITHUB_STEP_SUMMARY
          RB2_DISTRIBUTE_RESP=$(curl -v -G ${{env.CURL_URL}} -H 'Content-Type:  application/json' -H "Authorization: Bearer ${{steps.setup-cli.outputs.oidc-token}}")
          echo $RB2_DISTRIBUTE_RESP > RB2_DISTRIBUTE-${{env.BUILD_ID}}.json
          cat RB2_DISTRIBUTE-${{env.BUILD_ID}}.json 
          items=$(echo "$RB2_DISTRIBUTE_RESP" | jq -c -r '.[] .targets[]')
          for item in ${items[@]}; do
            echo $item
            echo "   - [${item}.jfrog.io](https://${item}.jfrog.io) " >> $GITHUB_STEP_SUMMARY
          done
          echo " " >> $GITHUB_STEP_SUMMARY

  gradleDownloadRBv1FromSaasEdge:
    name: "Gradle: Download RBv1 from SaaS ${{vars.JF_EDGE_NAME}} Edge"
    needs: gradleRBv1Distribution
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
       run:
         working-directory: "${{env.DEFAULT_WORKSPACE}}"
    env:
      JF_EDGE_URL: "https://${{vars.JF_EDGE_NAME}}.jfrog.io"
      BUILD_ID: "psj-gdl-${{github.run_number}}"
    steps:
      - name: "Setup JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        id: setup-cli
        env:
          JF_URL: ${{env.JF_EDGE_URL}}
          JFROG_CLI_LOG_LEVEL: "ERROR"
        with:
          version: latest 
          oidc-provider-name: ${{vars.JF_OIDC_PROVIDER_NAME}}    
          disable-job-summary: ${{env.JOB_SUMMARY}}
      
      - name: "Edge config show"
        run: |
          jf config show

      - name: "Download Build from SaaS Edge"
        run: |
          jf rt dl --build-name=${{env.BUILD_NAME}} --build-number=${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      # refer: https://docs.jfrog-applications.jfrog.io/jfrog-applications/jfrog-cli/binaries-management-with-jfrog-artifactory/release-lifecycle-management#download-release-bundle-v2-content
      - name: "Download RBv2 from SaaS Edge"
        run: |
          jf rt dl --bundle ${{env.RBV2_BUNDLE_NAME}}/${{env.BUILD_ID}} --detailed-summary=true --threads=100 --project=${{env.PROJECT_KEY}}

      - name: "Info list"
        run: |
          pwd
          ls -lR .

      - name: "Optional: Saas ${{vars.JF_EDGE_NAME}} Edge summary"
        run: |
          echo "# :frog: Download package from SaaS ${{vars.JF_EDGE_URL}} 📦 " >> $GITHUB_STEP_SUMMARY
          echo "  - Download RBv2 from Edge [${{vars.JF_EDGE_NAME}}](${{env.JF_EDGE_URL}}) " >> $GITHUB_STEP_SUMMARY
          echo " " >> $GITHUB_STEP_SUMMARY


  